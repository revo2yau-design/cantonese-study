        // Get all unique categories
        function getCategories() {
            const cats = [...new Set(dictionary.map(item => item.category))];
            return cats.sort();
        }

        // Render category list in sidebar
        function renderCategoryList() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            
            const categories = getCategories();
            
            // All words button
            const allBtn = document.createElement('button');
            allBtn.className = `category-btn w-full text-left px-4 py-2.5 rounded-2xl text-sm flex items-center gap-x-3 border border-transparent hover:bg-zinc-800 active:bg-zinc-700`;
            allBtn.innerHTML = `
                <i class="fa-solid fa-list w-4 text-sky-400"></i>
                <span class="font-medium">全部詞彙</span>
            `;
            allBtn.onclick = () => showAllWords();
            container.appendChild(allBtn);
            
            categories.forEach(cat => {
                const count = dictionary.filter(w => w.category === cat).length;
                const btn = document.createElement('button');
                btn.className = `category-btn w-full text-left px-4 py-2.5 rounded-2xl text-sm flex items-center justify-between gap-x-3 border border-transparent hover:bg-zinc-800 active:bg-zinc-700`;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-folder w-4 text-sky-400"></i>
                        <span class="font-medium">${cat}</span>
                    </div>
                    <span class="text-xs px-2 py-0.5 bg-zinc-700 rounded-full text-zinc-400">${count}</span>
                `;
                btn.onclick = () => filterByCategory(cat, btn);
                container.appendChild(btn);
            });
        }

        let currentFilterCategory = null;
        let currentSearchTerm = '';

        function filterByCategory(category, activeBtn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-sky-600', 'text-white'));
            activeBtn.classList.add('active', 'bg-sky-600', 'text-white');
            
            currentFilterCategory = category;
            currentSearchTerm = '';
            document.getElementById('main-search').value = '';
            
            document.getElementById('current-category-title').innerText = category;
            
            // Show reminder badge only for 地區 category
            const reminder = document.getElementById('district-reminder');
            if (reminder) {
                if (category === "地區") {
                    reminder.classList.remove('hidden');
                    reminder.classList.add('flex');
                } else {
                    reminder.classList.add('hidden');
                    reminder.classList.remove('flex');
                }
            }
            
            renderVocabularyGrid();
            
            // Auto close sidebar on mobile after selecting a category
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('sidebar-backdrop');
                if (sidebar) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                }
                if (backdrop) backdrop.remove();
            }
        }

        function showAllWords() {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-sky-600', 'text-white'));
            currentFilterCategory = null;
            currentSearchTerm = '';
            document.getElementById('main-search').value = '';
            document.getElementById('current-category-title').innerText = '全部詞彙';
            
            const reminder = document.getElementById('district-reminder');
            if (reminder) {
                reminder.classList.add('hidden');
                reminder.classList.remove('flex');
            }
            
            renderVocabularyGrid();
            
            // Auto close sidebar on mobile
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('sidebar-backdrop');
                if (sidebar) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex');
                }
                if (backdrop) backdrop.remove();
            }
        }

        function filterMainGrid() {
            currentSearchTerm = document.getElementById('main-search').value.toLowerCase().trim();
            renderVocabularyGrid();
        }

        // Render vocabulary grid
        function renderVocabularyGrid(filteredData = null) {
            const grid = document.getElementById('vocabulary-grid');
            grid.innerHTML = '';
            
            let data = filteredData || dictionary;
            
            if (currentFilterCategory) {
                data = data.filter(item => item.category === currentFilterCategory);
            }
            
            if (currentSearchTerm) {
                data = data.filter(item => 
                    item.word.toLowerCase().includes(currentSearchTerm) ||
                    item.jyutping.toLowerCase().includes(currentSearchTerm) ||
                    item.mandarin.includes(currentSearchTerm) ||
                    item.english.toLowerCase().includes(currentSearchTerm) ||
                    item.example.includes(currentSearchTerm)
                );
            }
            
            // Word count badge next to category title removed
            
            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="text-center py-12 text-zinc-500">
                        <i class="fa-solid fa-search text-4xl mb-4"></i>
                        <p>找不到相關詞彙</p>
                    </div>
                `;
                return;
            }
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `word-card bg-zinc-800 border border-zinc-700 rounded-3xl p-5 flex flex-col cursor-pointer`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="cantonese-text text-xl md:text-2xl">${item.word}</div>
                            <div class="jyutping text-lg">${item.jyutping}</div>
                        </div>
                        <div class="flex items-center gap-x-2">
                            <div class="text-xs px-3 py-1 bg-zinc-700 rounded-full text-zinc-400">${item.category}</div>
                            <button class="speak-btn text-sky-400 hover:text-sky-300 p-2" title="聽發音">
                                <i class="fa-solid fa-volume-up text-xl"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="text-sm text-zinc-400 mb-3">${item.mandarin} ｜ ${item.english}</div>
                    
                    <div class="mt-auto pt-3 border-t border-zinc-700">
                        <div class="text-sm flex items-start justify-between gap-x-2">
                            <div class="flex-1">
                                <span class="text-sky-400">例句：</span> 
                                <span class="text-zinc-300">${item.example}</span>
                                ${item.example_jyutping ? `<div class="text-xs text-sky-300 mt-0.5 ml-8">${item.example_jyutping}</div>` : ''}
                            </div>
                            <button class="example-speak-btn text-sky-400 hover:text-sky-300 p-1 flex-shrink-0" title="聽例句發音">
                                <i class="fa-solid fa-volume-up"></i>
                            </button>
                        </div>
                        <div class="text-xs text-zinc-500 mt-2">${item.tip}</div>
                    </div>
                `;
                
                const speakBtn = card.querySelector('.speak-btn');
                speakBtn.onclick = (e) => {
                    e.stopImmediatePropagation();
                    speakWord(item.word);
                };

                // New: Speak the example sentence
                const exampleSpeakBtn = card.querySelector('.example-speak-btn');
                if (exampleSpeakBtn) {
                    exampleSpeakBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        speakWord(item.example);
                    };
                }
                
                // Special behavior for 地區 category
                if (item.category === "地區") {

                        alert(`${item.word}\n\n${item.jyutping}\n\n${item.example}\n\n${item.tip}`);

            const titleEl = document.getElementById('district-modal-title');
            const jyutpingEl = document.getElementById('district-modal-jyutping');
            const attractionsContainer = document.getElementById('district-attractions');
            
            titleEl.innerText = districtName;
            
            // Find the district word to get Jyutping
            const districtWord = dictionary.find(w => w.word === districtName && w.category === "地區");
            if (districtWord) {
                jyutpingEl.innerText = districtWord.jyutping;
            }
            
            attractionsContainer.innerHTML = '';
            
            const attractions = districtAttractions[districtName] || [];
            
            if (attractions.length === 0) {
                attractionsContainer.innerHTML = `
                    <div class="col-span-2 text-center py-8 text-zinc-500">
                        <p>暫時未有此區的景點資料</p>
                    </div>
                `;
            } else {
                attractions.forEach(attr => {
                    const card = document.createElement('div');
                    card.className = `attraction-card bg-zinc-800 border border-zinc-700 rounded-2xl p-4 flex flex-col`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="cantonese-text text-xl">${attr.word}</div>
                                <div class="jyutping">${attr.jyutping}</div>
                            </div>
                            <button class="speak-btn text-sky-400 hover:text-sky-300 p-2" title="聽發音">

                        <div class="mt-auto pt-3 border-t border-zinc-700 text-sm">

                                    ${attr.example_jyutping ? `<div class="text-xs text-sky-300 mt-0.5 ml-8">${attr.example_jyutping}</div>` : ''}
                                </div>
                                <button class="example-speak-btn text-sky-400 hover:text-sky-300 p-1 flex-shrink-0" title="聽例句發音">
                                    <i class="fa-solid fa-volume-up"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    
                    const speakBtn = card.querySelector('.speak-btn');
                    speakBtn.onclick = (e) => {
                        e.stopImmediatePropagation();
                        speakWord(attr.word);
                    };
                    
                    // Example sentence speak button
                    const exampleSpeakBtn = card.querySelector('.example-speak-btn');
                    if (exampleSpeakBtn) {
                        exampleSpeakBtn.onclick = (e) => {
                            e.stopImmediatePropagation();
                            speakWord(attr.example);
                        };
                    }
                    
                    attractionsContainer.appendChild(card);
                });
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // Speak function
        function speakWord(text) {
            // Use Google Translate TTS (Cantonese)
            // Note: This is unofficial usage and may have rate limits.
            if (!text || text.trim() === '') return;

            // Google Translate has ~200 character limit per request
            if (text.length > 180) {
                text = text.substring(0, 180);
            }

            const encodedText = encodeURIComponent(text);
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=yue&client=tw-ob&q=${encodedText}`;

            const audio = new Audio(url);
            
            audio.play().catch(error => {
                console.error('語音播放失敗:', error);
                // Fallback message
                alert('語音播放失敗。可能是網路問題或該裝置不支援。');
            });
        }

        // Mobile Sidebar Toggle (Overlay style on mobile)
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
                
                // Add backdrop on mobile
                if (window.innerWidth < 768) {
                    const backdrop = document.createElement('div');
                    backdrop.id = 'sidebar-backdrop';
                    backdrop.className = 'fixed inset-0 bg-black/60 z-[55] md:hidden';
                    backdrop.onclick = () => toggleMobileSidebar();
                    document.body.appendChild(backdrop);
                }
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
                
                // Remove backdrop
                const backdrop = document.getElementById('sidebar-backdrop');
                if (backdrop) backdrop.remove();
            }
        }
